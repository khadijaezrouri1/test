<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Investor Hub | Founder Only</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  /* Stili originali mantenuti */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #F5F4F0; --surface: #FFFFFF; --surface2: #EFEFEA;
    --border: rgba(0,0,0,0.08); --border-strong: rgba(0,0,0,0.14);
    --text: #1A1A18; --text-muted: #6B6B65; --text-faint: #A0A09A;
    --accent: #1A1A18; --green: #1D7A52; --green-bg: #E8F5EE;
    --amber: #8A5A00; --amber-bg: #FDF3DC; --blue: #1A4A8A;
    --blue-bg: #EAF0FB; --purple: #4A2E8A; --purple-bg: #F0ECFB;
    --radius: 10px; --radius-sm: 6px; --font: 'DM Sans', sans-serif; --mono: 'DM Mono', monospace;
  }
  body { font-family: var(--font); background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.5; min-height: 100vh; background-color: #FAFAFA}
  .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .logo { font-size: 14px; font-weight: 600; letter-spacing: -0.02em; color: var(--text); }
  .logo span { color: var(--text-faint); font-weight: 400; }
  .pill-founders { font-size: 11px; font-family: var(--mono); background: var(--surface2); color: var(--text-muted); padding: 3px 8px; border-radius: 20px; border: 1px solid var(--border);background-color: #F1F5F9 }
.btn-add {
  font-family: var(--font);
  font-size: 14px;
  font-weight: 500;
  background: #3B4CCA; /* Il blu vivace richiesto */
  color: #ffffff;
  border: none;
  border-radius: 12px; /* Angoli molto arrotondati come da screenshot */
  padding: 10px 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  /* Transizione solo sul colore per un effetto pulito */
  transition: background-color 0.2s ease;
}

.btn-add:hover {
  background: #2D3BA5; /* Diventa leggermente più scuro senza muoversi */
}

/* Dimensioni dell'icona allineate al nuovo stile */
.btn-add svg {
  width: 18px;
  height: 18px;
}
.stats-bar { 
    display: flex; 
    gap: 20px; /* Aumenta lo spazio visivo tra i due item */
    padding: 10px; /* Padding esterno per allontanarli dai bordi pagina */
    background: transparent; 
    justify-content: center; /* Centralizza gli item orizzontalmente */
    max-width: 800px; /* Riduce la larghezza massima del contenitore */
    margin: 0 auto; /* Centra l'intero blocco nella pagina */
    border-bottom: none; /* Rimuove la linea di separazione per un look più pulito */
    background-color: #FAFAFA;
     border-radius: 20px;
  }

  .stat-item { 
    flex: 0 1 300px; /* Impedisce alle card di allargarsi troppo (larghezza fissa max 300px) */
    background: var(--surface); 
    padding: 24px; 
    display: flex; 
    flex-direction: column; 
    gap: 8px; 
    border-radius: 20px; /* Mantiene l'arrotondamento dello screenshot */
    border: 1px solid var(--border); 
    box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04); 
    
  }

  .stat-label { 
    font-size: 16px; /* Più grande e leggibile */
    color: var(--text-muted); 
    font-family: var(--font); /* Passato da Mono a Sans per matchare lo screenshot */
    text-transform: none; /* Rimosso l'uppercase per un look più moderno */
  }

  .stat-val { 
    font-size: 32px; /* Font grande e d'impatto */
    font-weight: 600; 
    color: var(--text); 
    letter-spacing: -0.02em;
  }
  .filters { padding: 12px 20px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; background: var(--bg); border-bottom: 1px solid var(--border);background-color: #FAFAFA; }
  .search-wrap { position: relative; flex: 1; min-width: 200px;}
  .search-wrap input { width: 100%; padding: 8px 12px 8px 34px; background: var(--surface); border: 1px solid var(--border-strong); border-radius: var(--radius-sm); outline: none; }
  .search-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--text-faint); }
  select { padding: 7px 10px; background: var(--surface); border: 1px solid var(--border-strong); border-radius: var(--radius-sm); cursor: pointer; outline: none; font-family: var(--font); }
  .table-wrap { padding: 16px 20px; background-color: #FAFAFA; border-radius: 20px; }
  .table-header { display: grid; grid-template-columns: 2fr 1fr 2fr 1.5fr 1fr; padding: 0 16px 8px; gap: 12px;  }
  .col-header { font-size: 11px; font-family: var(--font);; text-transform: uppercase; color: var(--text-faint); }
  .investor-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 6px; overflow: hidden; cursor: pointer; transition: all 0.15s; }
  .investor-card:hover { border-color: var(--border-strong); box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
  .card-row { display: grid; grid-template-columns: 2fr 1fr 2fr 1.5fr 1fr; align-items: center; padding: 14px 16px; gap: 12px; }
  .inv-name { font-size: 14px; font-weight: 600; color: var(--text); }
  .inv-fund { font-size: 12px; color: var(--text-muted); }
  .tags { display: flex; flex-wrap: wrap; gap: 4px; }
  .tag { font-size: 11px; font-family: var(--mono); padding: 3px 7px; border-radius: 4px; }
  .tag-stage-seed { background: var(--amber-bg); color: var(--amber); }
  .tag-sector { background: var(--surface2); color: var(--text-muted); }
  .founder-bubbles { display: flex; flex-wrap: wrap; gap: 4px;  }
  .fbubble { font-size: 11px; background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 2px 8px; color: var(--text-muted); background-color: #F1F5F9; font-weight: bold; color: #1A1A18; }
  .status-chip { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; }
  .dot { width: 6px; height: 6px; border-radius: 50%; }
  .dot-green { background: var(--green); }
  .dot-gray { background: var(--text-faint); }
  .card-detail { display: none; border-top: 1px solid var(--border); padding: 16px; background: var(--bg); grid-template-columns: 1fr 1fr 1fr; gap: 20px; }
  .card-detail.open { display: grid; }
  .detail-block-label { font-size: 11px; font-family: var(--font); text-transform: uppercase; color: var(--text-faint); margin-bottom: 8px; }
  .detail-note { font-size: 13px; color: var(--text-muted); font-style: italic; }
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.35); z-index: 200; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border-radius: var(--radius); width: 480px; padding: 24px; }
  .form-group { margin-bottom: 14px; }
  .form-label { font-size: 12px; font-family: var(--font);; color: var(--text-muted); margin-bottom: 5px; display: block; text-transform: uppercase; }
  .form-input { width: 100%; padding: 8px 10px; background: var(--bg); border: 1px solid var(--border-strong); border-radius: var(--radius-sm); outline: none; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }
  .select-status { width: 100%; margin-top: 4px; border: 1px solid var(--border-strong); border-radius: var(--radius-sm); padding: 5px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="logo">Investor Hub</div>
    <span class="pill-founders" id="current-user-display">Founder</span>
  </div>
  <button class="btn-add" onclick="openModal()">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="2" x2="8" y2="14"/><line x1="2" y1="8" x2="14" y2="8"/></svg>
    Aggiungi
  </button>
</div>

<div class="stats-bar">
  <div class="stat-item"><div class="stat-label">Totale investitori</div><div class="stat-val" id="stat-total">0</div></div>
  <div class="stat-item"><div class="stat-label">Investitori contattati</div><div class="stat-val" id="stat-contacted">0</div></div>
</div>

<div class="filters">
  <div class="search-wrap">
    <svg class="search-icon" width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><circle cx="6.5" cy="6.5" r="4.5"/><line x1="10" y1="10" x2="14" y2="14"/></svg>
    <input type="text" id="search" placeholder="Cerca investitore o fondo..." oninput="render()">
  </div>
  
  <select id="f-stage" onchange="render()">
    <option value="">Tutti gli stage</option>
    <option value="Pre-seed">Pre Seed</option>
    <option value="Seed">Seed</option>
    <option value="Series A">Post Seed</option>
  </select>

  <select id="f-sector" onchange="render()">
    <option value="">Tutti i settori</option>
    <option value="Fintech">Fintech</option>
    <option value="SaaS">SaaS</option>
    <option value="Deeptech">Deeptech</option>
    <option value="Climate">Climate</option>
    <option value="Marketplace">Marketplace</option>
    <option value="HealthTech">HealthTech</option>
  </select>

  <select id="f-status-filter" onchange="render()">
    <option value="">Status: Tutti</option>
    <option value="Contattato">Contattato</option>
    <option value="Non contattato">Non contattato</option>
  </select>
</div>

<div class="table-wrap">
  <div class="table-header">
    <div class="col-header">Investitore</div>
    <div class="col-header">Stage</div>
    <div class="col-header">Settori</div>
    <div class="col-header">Founder network</div>
    <div class="col-header">Status</div>
  </div>
  <div id="list"></div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3 style="margin-bottom:20px">Nuovo investitore</h3>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Investitore</label><input class="form-input" id="f-inv-name" type="text"></div>
      <div class="form-group"><label class="form-label">Fondo</label><input class="form-input" id="f-fund" type="text"></div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Stage</label>
        <select class="form-input" id="f-new-stage">
            <option value="Seed">Seed</option>
            <option value="Pre-seed">Pre-seed</option>
            <option value="Series A">Post Seed</option>
        </select>
      </div>
      <div class="form-group"><label class="form-label">Ticket medio</label><input class="form-input" id="f-ticket" type="text"></div>
    </div>
    <div class="form-group"><label class="form-label">Settori (virgola)</label><input class="form-input" id="f-sectors" type="text" placeholder="SaaS, Fintech..."></div>
    
    <div class="form-group">
      <label class="form-label">Descrizione</label>
      <textarea class="form-input" id="f-note" rows="4" style="resize: vertical; min-height: 80px;"></textarea>
    </div>

    <div class="modal-actions">
      <button onclick="closeModal()" style="background:none; border:none; cursor:pointer">Annulla</button>
      <button class="btn-save" onclick="addInvestor()" style="background:var(--accent); color:white; border:none; padding:8px 16px; border-radius:6px; cursor:pointer">Salva</button>
    </div>
  </div>
</div>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

  const SUPABASE_URL = 'https://lnncxfnigdzarzyfwakr.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxubmN4Zm5pZ2R6YXJ6eWZ3YWtyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5NDM5NTgsImV4cCI6MjA5MzUxOTk1OH0.tySF08HVUwGJ2wkLgA9vKKtZxLJ8agRdvgQW7qlA-t4';
  const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

  const params = new URLSearchParams(window.location.search);
  const firstName = params.get('name') || "";
  const lastName = params.get('lastname') || "";
  const currentUser = (firstName || lastName) ? `${firstName} ${lastName}`.trim() : "Founder";
  document.getElementById('current-user-display').textContent = currentUser;

  let investors = [];

  async function loadInvestors() {
    const { data, error } = await supabase.from('investors').select('*').order('created_at', { ascending: false });
    if (!error) {
      investors = data.map(row => ({
        ...row,
        stage: Array.isArray(row.stage) ? row.stage : (row.stage ? [row.stage] : []),
        sectors: Array.isArray(row.sectors) ? row.sectors : (row.sectors ? [row.sectors] : []),
        founders: Array.isArray(row.founders) ? row.founders : (row.founders ? [row.founders] : [])
      }));
      render();
    }
  }

  window.toggleFounderStatus = async function(selectEl, id, newStatus) {
    selectEl.disabled = true;
    const inv = investors.find(i => i.id === id);
    let updatedFounders = [...inv.founders];

    if (newStatus === 'Contattato') {
      if (!updatedFounders.includes(currentUser)) updatedFounders.push(currentUser);
    } else {
      updatedFounders = updatedFounders.filter(f => f !== currentUser);
    }

    const { error } = await supabase.from('investors').update({ founders: updatedFounders }).eq('id', id);
    if (!error) {
        inv.founders = updatedFounders;
        render();
    } else {
        alert("Errore: " + error.message);
        selectEl.disabled = false;
    }
  }

  window.render = function() {
    const q = document.getElementById('search').value.toLowerCase();
    const fStage = document.getElementById('f-stage').value;
    const fSector = document.getElementById('f-sector').value;
    const fStatus = document.getElementById('f-status-filter').value;

    const filtered = investors.filter(inv => {
      const matchSearch = (inv.name.toLowerCase().includes(q) || inv.fund.toLowerCase().includes(q));
      const matchStage = !fStage || inv.stage.includes(fStage);
      const matchSector = !fSector || inv.sectors.some(s => s.toLowerCase() === fSector.toLowerCase());
      
      const isMe = inv.founders.includes(currentUser);
      let matchStatus = true;
      if (fStatus === 'Contattato') matchStatus = isMe;
      if (fStatus === 'Non contattato') matchStatus = !isMe;

      return matchSearch && matchStage && matchSector && matchStatus;
    });

    document.getElementById('stat-total').textContent = investors.length;
    document.getElementById('stat-contacted').textContent = investors.filter(i => i.founders.includes(currentUser)).length;

    const list = document.getElementById('list');
    list.innerHTML = filtered.map(inv => {
      const isMe = inv.founders.includes(currentUser);
      return `
        <div class="investor-card">
          <div class="card-row" onclick="this.parentElement.querySelector('.card-detail').classList.toggle('open')">
            <div><div class="inv-name">${inv.name}</div><div class="inv-fund">${inv.fund}</div></div>
            <div class="tags">${inv.stage.map(s => `<span class="tag tag-stage-seed">${s}</span>`).join('')}</div>
            <div class="tags">${inv.sectors.map(s => `<span class="tag tag-sector">${s}</span>`).join('')}</div>
            <div class="founder-bubbles">${inv.founders.length > 0 ? inv.founders.map(f => `<span class="fbubble">${f}</span>`).join('') : '<span class="fbubble-none">—</span>'}</div>
            <div class="status-chip">
              <span class="dot ${isMe ? 'dot-green' : 'dot-gray'}"></span>
              ${isMe ? 'Contattato' : 'Non contattato'}
            </div>
          </div>
          <div class="card-detail" onclick="event.stopPropagation()">
              <div class="detail-block">
                  <div class="detail-block-label">Status</div>
                  <select class="select-status" onchange="toggleFounderStatus(this, '${inv.id}', this.value)">
                      <option value="Non contattato" ${!isMe ? 'selected' : ''}>Non contattato</option>
                      <option value="Contattato" ${isMe ? 'selected' : ''}>Contattato</option>
                  </select>
              </div>
              <div class="detail-block"><div class="detail-block-label">Descrizione</div><div class="detail-note">${inv.description || 'Nessuna nota'}</div></div>
              <div class="detail-block"><div class="detail-block-label">Ticket</div><div>${inv.ticket || '—'}</div></div>
          </div>
        </div>
      `;
    }).join('');
  }

  window.openModal = () => document.getElementById('modal').classList.add('open');
  window.closeModal = () => document.getElementById('modal').classList.remove('open');

  window.addInvestor = async function() {
    const invName = document.getElementById('f-inv-name').value.trim();
    const fund = document.getElementById('f-fund').value.trim();
    const sectors = document.getElementById('f-sectors').value.split(',').map(s => s.trim()).filter(Boolean);
    
    if (!invName || !fund) { alert("Inserisci Nome e Fondo"); return; }

    const { error } = await supabase.from('investors').insert([{
      name: invName, 
      fund: fund, 
      stage: [document.getElementById('f-new-stage').value],
      sectors, 
      ticket: document.getElementById('f-ticket').value,
      status: 'Mai contattato', 
      founders: [], 
      description: document.getElementById('f-note').value
    }]);

    if (!error) { window.closeModal(); loadInvestors(); }
    else { alert("Errore: " + error.message); }
  };

  loadInvestors();
</script>
</body>
</html>
