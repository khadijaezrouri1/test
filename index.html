<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  /* Base & Variables */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #F5F4F0; --surface: #FFFFFF; --surface2: #EFEFEA;
    --border: rgba(0,0,0,0.08); --border-strong: rgba(0,0,0,0.14);
    --text: #1A1A18; --text-muted: #6B6B65; --text-faint: #A0A09A;
    --accent: #1A1A18; --radius: 10px; --radius-sm: 6px; --font: 'DM Sans', sans-serif; --mono: 'DM Mono', monospace;
    
    /* Bubble Colors */
    --c-fund-bg: #f6cece; --c-fund-text: #991B1B;
    --c-stage-bg: #FEF3C7; --c-stage-text: #92400E;
    --c-company-bg: #DBEAFE; --c-company-text: #1E40AF;
    --c-founder-bg: #F1F5F9; --c-founder-text: #475569;
  }
  
  body { font-family: var(--font); background: #FAFAFA; color: var(--text); font-size: 14px; line-height: 1.5; min-height: 100vh; }
  
  /* Header */
  .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; border-radius: 22px; margin: 10px; }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .logo { font-size: 14px; font-weight: 600; letter-spacing: -0.02em; color: var(--text); }
  .pill-founders { font-size: 11px; font-family: var(--mono); background: #F1F5F9; color: var(--text-muted); padding: 3px 8px; border-radius: 20px; border: 1px solid var(--border); }

  /* Buttons */
  .btn-add {
    font-family: var(--font); font-size: 14px; font-weight: 500;
    background: #3B4CCA; color: #ffffff; border: none; border-radius: 12px;
    padding: 10px 20px; cursor: pointer; display: flex; align-items: center; gap: 10px;
    transition: background-color 0.2s ease;
  }
  .btn-add:hover { background: #2D3BA5; }

  .btn-filter {
    background: #EFEFEA; border: 1px solid var(--border); padding: 10px 16px; border-radius: 12px;
    cursor: pointer; display: flex; align-items: center; gap: 8px;
    font-family: var(--font); font-weight: 500; color: var(--text-muted);
    transition: box-shadow 0.1s ease; outline: none;
  }
  .btn-filter:hover { background: #EFEFEA; color: var(--text-muted); box-shadow: inset 0 0 0 1px var(--border-strong); }

  .btn-done-large {
    background: #3B4CCA; color: white; border: none; padding: 10px 32px;
    border-radius: 10px; cursor: pointer; font-family: var(--font); font-weight: 600; font-size: 15px;
  }
  .btn-done-large:hover { background: #3B4CCA !important; box-shadow: inset 0 0 0 1px rgba(255,255,255,0.3); }

  .btn-clear-link {
    background: #FFFFFF; color: var(--text-muted); border: 1px solid var(--border-strong);
    padding: 10px 32px; border-radius: 10px; cursor: pointer; font-family: var(--font);
    font-size: 14px; font-weight: 500; transition: box-shadow 0.1s ease;
  }
  .btn-clear-link:hover { background: #FFFFFF !important; box-shadow: inset 0 0 0 1px var(--text-muted); }

  .btn-network-action {
    background: #3B4CCA; color: #FFFFFF; border: none;
    padding: 6px 12px; border-radius: 8px; cursor: pointer; font-family: var(--font);
    font-size: 12px; font-weight: 600; transition: all 0.15s ease;
    white-space: nowrap; justify-self: end;
  }
  .btn-network-action:hover { background: #2D3BA5; }

  /* Stats */
  .stats-bar { display: flex; gap: 20px; padding: 20px; justify-content: center; max-width: 800px; margin: 0 auto; }
  .stat-item { flex: 0 1 300px; background: var(--surface); padding: 24px; display: flex; flex-direction: column; gap: 8px; border-radius: 20px; border: 1px solid var(--border); box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04); }
  .stat-label { font-size: 16px; color: var(--text-muted); }
  .stat-val { font-size: 32px; font-weight: 600; color: var(--text); }

  /* Filters & Popover */
  .filters { padding: 12px 20px; display: flex; gap: 8px; align-items: center; position: relative; }
  .search-wrap { position: relative; flex: 1; }
  .search-wrap input { width: 100%; padding: 8px 12px 8px 34px; background: var(--surface); border: 1px solid var(--border-strong); border-radius: var(--radius-sm); outline: none; }
  .search-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--text-faint); }
  
  .filter-popover {
    display: none; position: absolute; top: 100%; right: 20px; margin-top: 12px;
    background: #FFFFFF; border: 1px solid var(--border); border-radius: 16px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.12); z-index: 1000; padding: 24px; min-width: 320px;
  }
  .filter-popover.open { display: block; }
  .filter-header-section { display: flex; justify-content: space-between; align-items: center; cursor: pointer; margin-bottom: 8px; }
  .filter-label { font-size: 15px; font-weight: 600; color: var(--text); }
  .filter-options-container { display: none; padding-bottom: 8px; }
  .filter-section.active .filter-options-container { display: block; }
  .filter-section.active .arrow-icon { transform: rotate(180deg); }
  .filter-option { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; font-size: 14px; }
  
  .filter-checkbox {
    width: 20px; height: 20px; border: 2px solid var(--border-strong);
    border-radius: 6px; cursor: pointer; appearance: none; position: relative; background: #fff;
  }
  .filter-checkbox:checked { background: #3B4CCA; border-color: #3B4CCA; }
  .filter-checkbox:checked::after { content: '✓'; position: absolute; color: white; font-size: 12px; left: 4px; top: 0px; font-weight: bold; }

  .popover-actions { display: flex; justify-content: space-between; align-items: center; margin-top: 24px; padding-top: 20px; border-top: 1px solid var(--border); }
  .filter-badge { display: inline-flex; align-items: center; justify-content: center; background: #3B4CCA; color: white; font-size: 11px; font-weight: 600; width: 18px; height: 18px; border-radius: 50%; margin-left: 6px; }
  .filter-badge:empty { display: none; }

  /* Table — 4 columns */
  .table-wrap { padding: 16px 20px; margin: 0 20px; background: white; border-radius: 22px; border: 1px solid var(--border); }
  .table-header { display: grid; grid-template-columns: 2fr 1.5fr 1.5fr 1fr; padding: 0 16px 8px; gap: 12px; border-bottom: 1px solid var(--border); margin-bottom: 10px; }
  .col-header { font-size: 11px; text-transform: uppercase; color: var(--text-faint); font-weight: 600; }
  .investor-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 6px; cursor: pointer; transition: all 0.15s; }
  .investor-card:hover { border-color: var(--border-strong); box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
  .card-row { display: grid; grid-template-columns: 2fr 1.5fr 1.5fr 1fr; align-items: center; padding: 14px 16px; gap: 12px; }
  .inv-name { font-size: 14px; font-weight: 600; margin-bottom: 2px; }

  /* Unified Bubble System */
  .bubble {
    display: inline-flex;
    align-items: center;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 700;
    line-height: 1;
    white-space: nowrap;
    margin-right: 4px;
    margin-bottom: 4px;
  }
  .bubble-fund { background: var(--c-fund-bg); color: var(--c-fund-text); margin-left: -2px; }
  .bubble-company { background: var(--c-company-bg); color: var(--c-company-text); }
  .bubble-company-kontai { background: #DCFCE7; color: #166534; }
  .bubble-company-condeo { background: #FFEDD5; color: #9A3412; }
  .bubble-company-veterly { background: #DBEAFE; color: #1E40AF; }
  .bubble-company-sencare { background: #F3E8FF; color: #6B21A8; }
  .bubble-company-donux { background: #374151; color: #F9FAFB; }
  .bubble-company-esgmax { background: #064E3B; color: #DCFCE7; }
  .bubble-company-default { background: #FCE7F3; color: #9D174D; }
  .bubble-founder { background: var(--c-founder-bg); color: var(--c-founder-text); border: 1px solid var(--border); }

  .tags { display: flex; flex-wrap: wrap; gap: 2px; }

  /* Detail panel — 2 columns layout */
  .card-detail { display: none; border-top: 1px solid var(--border); padding: 16px; background: var(--bg); gap: 20px; }
  .card-detail.open { display: grid; grid-template-columns: 1.5fr 1fr; }
  .detail-block-label { font-size: 11px; text-transform: uppercase; color: var(--text-faint); margin-bottom: 8px; font-weight: 600; }
  .detail-note { font-size: 13px; color: var(--text-muted); }

  /* Ticket block — bullet list style */
  .ticket-block { display: flex; flex-direction: column; gap: 4px; }
  .ticket-line { font-size: 13px; color: var(--text); display: flex; align-items: baseline; gap: 6px; }
  .ticket-line::before { content: '•'; color: var(--text-faint); flex-shrink: 0; }
  .ticket-round { font-size: 11px; color: var(--text-muted); font-weight: 500; }
  .ticket-empty { font-size: 13px; color: var(--text-faint); font-style: italic; }

  /* Modal */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.35); z-index: 200; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border-radius: var(--radius); width: 520px; padding: 24px; }
  .form-group { margin-bottom: 14px; }
  .form-label { font-size: 12px; color: var(--text-muted); margin-bottom: 5px; display: block; text-transform: uppercase; }
  .form-label .req { color: #991B1B; margin-left: 2px; }
  .form-input { width: 100%; padding: 8px 10px; background: var(--bg); border: 1px solid var(--border-strong); border-radius: var(--radius-sm); outline: none; font-family: var(--font); font-size: 14px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }

  /* Pagination Styles */
  .pagination-container {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-top: 16px;
    margin-top: 12px;
    border-top: 1px solid var(--border);
  }
  .pagination-info {
    font-size: 13px;
    color: var(--text-muted);
  }
  .pagination-buttons {
    display: flex;
    gap: 8px;
  }
  .btn-pagination {
    background: #FFFFFF;
    border: 1px solid var(--border-strong);
    color: var(--text);
    padding: 6px 12px;
    border-radius: 8px;
    cursor: pointer;
    font-family: var(--font);
    font-size: 13px;
    font-weight: 500;
    transition: all 0.15s ease;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .btn-pagination:hover:not(:disabled) {
    background: var(--surface2);
    border-color: var(--text);
  }
  .btn-pagination:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    background: var(--surface);
    border-color: var(--border);
    color: var(--text-faint);
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="logo">Network</div>
    <span class="pill-founders" id="current-user-display">Founder</span>
  </div>
  <button class="btn-add" onclick="openModal()">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="2" x2="8" y2="14"/><line x1="2" y1="8" x2="14" y2="8"/></svg>
    Aggiungi
  </button>
</div>

<div class="stats-bar">
  <div class="stat-item"><div class="stat-label">Totale investitori</div><div class="stat-val" id="stat-total">0</div></div>
</div>

<div class="filters">
  <div class="search-wrap">
    <svg class="search-icon" width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><circle cx="6.5" cy="6.5" r="4.5"/><line x1="10" y1="10" x2="14" y2="14"/></svg>
    <input type="text" id="search" placeholder="Cerca investitore o fondo..." oninput="handleFilterChange()">
  </div>

  <div style="position: relative;">
    <button class="btn-filter" id="filter-trigger" onclick="toggleFilterMenu(event)">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="6" x2="20" y2="6"></line><line x1="6" y1="12" x2="18" y2="12"></line><line x1="9" y1="18" x2="15" y2="18"></line></svg>
      Filtra
      <span id="badge-total" class="filter-badge"></span>
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>
    </button>

    <div id="filter-menu" class="filter-popover" onclick="event.stopPropagation()">
      <div class="filter-section active"> 
        <div class="filter-header-section" onclick="toggleSection(this)">
          <div style="display:flex; align-items:center">
            <span class="filter-label">Stage</span>
            <span id="badge-stage" class="filter-badge"></span>
          </div>
          <svg class="arrow-icon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>
        </div>
        <div class="filter-options-container">
          <div class="filter-option"><span>Pre-seed</span><input type="checkbox" class="filter-checkbox f-stage-cb" value="Pre-seed" onchange="handleFilterChange()"></div>
          <div class="filter-option"><span>Seed</span><input type="checkbox" class="filter-checkbox f-stage-cb" value="Seed" onchange="handleFilterChange()"></div>
          <div class="filter-option"><span>Post Seed</span><input type="checkbox" class="filter-checkbox f-stage-cb" value="Post Seed" onchange="handleFilterChange()"></div>
          <div class="filter-option"><span>Series A</span><input type="checkbox" class="filter-checkbox f-stage-cb" value="Series A" onchange="handleFilterChange()"></div>
        </div>
      </div>

      <hr style="border: 0; border-top: 1px solid var(--border); margin: 12px 0;">
      
      <div class="filter-section active"> 
        <div class="filter-header-section" onclick="toggleSection(this)">
          <div style="display:flex; align-items:center">
            <span class="filter-label">Società</span>
            <span id="badge-sector" class="filter-badge"></span>
          </div>
          <svg class="arrow-icon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>
        </div>
        <div class="filter-options-container">
          <div class="filter-option"><span>SB</span><input type="checkbox" class="filter-checkbox f-sector-cb" value="Startup Bakery" onchange="handleFilterChange()"></div>
          <div class="filter-option"><span>Condeo</span><input type="checkbox" class="filter-checkbox f-sector-cb" value="Condeo" onchange="handleFilterChange()"></div>
          <div class="filter-option"><span>Donux</span><input type="checkbox" class="filter-checkbox f-sector-cb" value="Donux" onchange="handleFilterChange()"></div>
          <div class="filter-option"><span>ESGmax</span><input type="checkbox" class="filter-checkbox f-sector-cb" value="ESGmax" onchange="handleFilterChange()"></div>
          <div class="filter-option"><span>Kontai</span><input type="checkbox" class="filter-checkbox f-sector-cb" value="Kontai" onchange="handleFilterChange()"></div>
          <div class="filter-option"><span>Sencare</span><input type="checkbox" class="filter-checkbox f-sector-cb" value="Sencare" onchange="handleFilterChange()"></div>
          <div class="filter-option"><span>Veterly</span><input type="checkbox" class="filter-checkbox f-sector-cb" value="Veterly" onchange="handleFilterChange()"></div>
        </div>
      </div>

      <div class="popover-actions">
        <button class="btn-clear-link" onclick="clearAllFilters()">Cancella tutto</button>
        <button class="btn-done-large" onclick="toggleFilterMenu(event)">Fatto</button>
      </div>
    </div>
  </div>
</div>

<div class="table-wrap">
  <div class="table-header">
    <div class="col-header">Investitore</div>
    <div class="col-header">Società</div>
    <div class="col-header">Contattato da</div>
  </div>
  <div id="list"></div>
  <div id="pagination" class="pagination-container"></div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3 style="margin-bottom:20px">Nuovo investitore</h3>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Investitore <span class="req">*</span></label><input class="form-input" id="f-inv-name" type="text" placeholder="Nome Cognome"></div>
      <div class="form-group"><label class="form-label">Società</label><input class="form-input" id="f-fund" type="text" placeholder="Es. Primo Ventures"></div>
    </div>
    <input type="hidden" id="f-new-company" value="">
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Email <span class="req">*</span></label>
        <input class="form-input" id="f-email" type="email" placeholder="email@esempio.com">
      </div>
      <div class="form-group">
        <label class="form-label">Telefono</label>
        <input class="form-input" id="f-phone" type="tel" placeholder="+39 000 000 0000">
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-clear-link" onclick="closeModal()">Annulla</button>
      <button class="btn-done-large" onclick="addInvestor()">Salva</button>
    </div>
  </div>
</div>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

  const SUPABASE_URL = 'https://lnncxfnigdzarzyfwakr.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxubmN4Zm5pZ2R6YXJ6eWZ3YWtyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5NDM5NTgsImV4cCI6MjA5MzUxOTk1OH0.tySF08HVUwGJ2wkLgA9vKKtZxLJ8agRdvgQW7qlA-t4';
  const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

  const params = new URLSearchParams(window.location.search);

  function formatFounderName(fullName) {
    if (!fullName) return "";
    const parts = fullName.trim().split(/\s+/);
    if (parts.length < 2) return fullName;
    return `${parts[0].charAt(0).toUpperCase()}. ${parts.slice(1).join(" ")}`;
  }

  const rawName = (params.get('name') || params.get('lastname'))
    ? `${params.get('name') || ''} ${params.get('lastname') || ''}`.trim()
    : "Founder";
  const currentUser = formatFounderName(rawName);
  document.getElementById('current-user-display').textContent = currentUser;

  const urlCompany = params.get('company') || '';
  document.getElementById('f-new-company').value = urlCompany;

  let investors = [];
  let currentPage = 1;
  const ITEMS_PER_PAGE = 10;

  window.handleFilterChange = () => {
    currentPage = 1;
    render();
  };

  window.changePage = (delta) => {
    currentPage += delta;
    render(true);
  };

  window.toggleFilterMenu = (e) => { e?.stopPropagation(); document.getElementById('filter-menu').classList.toggle('open'); };
  window.toggleSection    = (el) => el.parentElement.classList.toggle('active');
  window.openModal        = () => document.getElementById('modal').classList.add('open');
  window.closeModal       = () => document.getElementById('modal').classList.remove('open');
  window.clearAllFilters  = () => { 
    document.querySelectorAll('.filter-checkbox').forEach(c => c.checked = false); 
    currentPage = 1;
    render(); 
  };
  window.addEventListener('click', () => document.getElementById('filter-menu').classList.remove('open'));

  async function loadInvestors() {
    const { data, error } = await supabase.from('investors').select('*').order('created_at', { ascending: false });
    if (!error) {
      investors = data.map(row => ({
        ...row,
        stage:    Array.isArray(row.stage)    ? row.stage    : (row.stage    ? [row.stage]    : []),
        company:  Array.isArray(row.company)  ? row.company  : (row.company  ? [row.company]  : []),
        founders: (Array.isArray(row.founders) ? row.founders : (row.founders ? [row.founders] : [])).map(f => formatFounderName(f)),
      }));
      render(true);
    }
  }

function renderTicketBlock(inv) {
    const ticketStr  = inv.ticket || '';
    const tickets    = ticketStr.split(',').map(t => t.trim()).filter(Boolean);

    if (tickets.length === 0) {
      return `<div class="ticket-block"><div class="ticket-empty">Nessun investimento registrato</div></div>`;
    }

    // Prende l'ultimo stage che non è Prospect come label del round
    const stages     = inv.stage.filter(s => s !== 'Prospect');
    const roundLabel = stages.length > 0 ? stages[stages.length - 1] : '';

    return `<div class="ticket-block">
      ${tickets.map(t => {
        const inMatch = t.match(/^(.+?)\s+in\s+(.+)$/i);
        const amount  = inMatch ? inMatch[1] : t;
        const company = inMatch ? ` in <strong>${inMatch[2]}</strong>` : '';
        const round   = roundLabel ? ` <span class="ticket-round">(${roundLabel})</span>` : '';
        return `<div class="ticket-line">${amount}${company}${round}</div>`;
      }).join('')}
    </div>`;
}
  window.addToNetworkDirectly = async function (id, event) {
    event.stopPropagation();
    
    const existing = investors.find(inv => inv.id === id);
    if (!existing) return;

    if (existing.founders.includes(currentUser) && (!urlCompany || existing.company.includes(urlCompany))) {
      return;
    }

    const updatedFounders = Array.from(new Set([...(existing.founders || []), currentUser])).filter(Boolean);
    const updatedCompany = urlCompany 
      ? Array.from(new Set([...(existing.company || []), urlCompany])).filter(Boolean)
      : existing.company;

    const { error } = await supabase
      .from('investors')
      .update({
        founders: updatedFounders,
        company: updatedCompany
      })
      .eq('id', id);

    if (!error) {
      loadInvestors();
    } else {
      alert("Errore durante l'aggiornamento: " + error.message);
    }
  };

  window.render = function (isNavigating = false) {
    if (!isNavigating) {
      currentPage = 1;
    }

    const q               = document.getElementById('search').value.toLowerCase();
    const selectedStages  = Array.from(document.querySelectorAll('.f-stage-cb:checked')).map(cb => cb.value);
    const selectedCompany = Array.from(document.querySelectorAll('.f-sector-cb:checked')).map(cb => cb.value);

    document.getElementById('badge-stage').textContent  = selectedStages.length  || '';
    document.getElementById('badge-sector').textContent = selectedCompany.length  || '';
    document.getElementById('badge-total').textContent  = (selectedStages.length + selectedCompany.length) || '';
    document.getElementById('stat-total').textContent   = investors.length;

    const filtered = investors.filter(inv => {
      const matchSearch  = inv.name.toLowerCase().includes(q) || (inv.fund && inv.fund.toLowerCase().includes(q));
      const matchStage   = selectedStages.length  === 0 || inv.stage.some(s   => selectedStages.includes(s));
      const matchCompany = selectedCompany.length === 0 || inv.company.some(c => selectedCompany.includes(c));
      return matchSearch && matchStage && matchCompany;
    });

    const totalPages = Math.ceil(filtered.length / ITEMS_PER_PAGE) || 1;
    if (currentPage > totalPages) {
      currentPage = totalPages;
    }
    if (currentPage < 1) {
      currentPage = 1;
    }

    const startIdx = (currentPage - 1) * ITEMS_PER_PAGE;
    const endIdx = startIdx + ITEMS_PER_PAGE;
    const paginated = filtered.slice(startIdx, endIdx);

    const list = document.getElementById('list');
    list.innerHTML = paginated.map(inv => {
      const isAlreadyInNetwork = inv.founders.includes(currentUser) && (!urlCompany || inv.company.includes(urlCompany));

      return `
      <div class="investor-card" data-id="${inv.id}">
        <div class="card-row" onclick="this.parentElement.querySelector('.card-detail').classList.toggle('open')">
          <div>
            <div class="inv-name">${inv.name}</div>
            ${inv.fund ? `<span class="bubble bubble-fund">${inv.fund}</span>` : ''}
          </div>
          <div class="tags">
            ${inv.company.map(c => {
              const name = c.toLowerCase().trim();
              const bubbleClass = ['kontai', 'condeo', 'veterly', 'sencare', 'donux', 'esgmax'].includes(name) 
                ? `bubble-company-${name}` 
                : 'bubble-company-default';
              return `<span class="bubble bubble-company ${bubbleClass}">${c}</span>`;
            }).join('') || '<span style="color:var(--text-faint);font-size:13px;">—</span>'}
          </div>
          <div class="tags">
            ${inv.founders.length > 0 ? inv.founders.map(f => `<span class="bubble bubble-founder">${f}</span>`).join('') : '—'}
          </div>
          <div>
            ${isAlreadyInNetwork ? '' : `
              <button class="btn-network-action" onclick="addToNetworkDirectly('${inv.id}', event)">
                + Contattato
              </button>
            `}
          </div>
        </div>
        <div class="card-detail" onclick="event.stopPropagation()">
          <div class="detail-block">
            <div class="detail-block-label">Investimento</div>
            ${renderTicketBlock(inv)}
          </div>
          <div class="detail-block">
            <div class="detail-block-label">Contatti</div>
            <div class="detail-note" style="font-style:normal; display:flex; flex-direction:column; gap:4px;">
              ${inv.email ? `<span>📧 ${inv.email}</span>` : '<span style="color:var(--text-faint); font-style:italic;">Nessuna email</span>'}
              ${inv.phone ? `<span>📞 ${inv.phone}</span>` : '<span style="color:var(--text-faint); font-style:italic;">Nessun numero</span>'}
            </div>
          </div>
        </div>
      </div>
    `;
    }).join('');

    const paginationEl = document.getElementById('pagination');
    if (paginationEl) {
      if (filtered.length === 0) {
        paginationEl.innerHTML = '';
      } else {
        paginationEl.innerHTML = `
          <div class="pagination-info">
            Mostrati <strong>${startIdx + 1}-${Math.min(endIdx, filtered.length)}</strong> di <strong>${filtered.length}</strong> investitori
          </div>
          <div class="pagination-buttons">
            <button class="btn-pagination" ${currentPage === 1 ? 'disabled' : ''} onclick="changePage(-1)">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"></polyline></svg>
              Precedente
            </button>
            <button class="btn-pagination" ${currentPage === totalPages ? 'disabled' : ''} onclick="changePage(1)">
              Successivo
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"></polyline></svg>
            </button>
          </div>
        `;
      }
    }
  };

  window.addInvestor = async function () {
    const piva        = document.getElementById('f-piva').value.trim();
    const invName     = document.getElementById('f-inv-name').value.trim();
    const fund        = document.getElementById('f-fund').value.trim();
    const newStage    = document.getElementById('f-new-stage').value;
    const newCompany  = document.getElementById('f-new-company').value;
    const rawTicket   = document.getElementById('f-ticket').value.trim();
    const email       = document.getElementById('f-email').value.trim();
    const phone       = document.getElementById('f-phone').value.trim();

    if (!invName) { alert("Inserisci il nome dell'investitore"); return; }
    if (!email)   { alert("Inserisci l'email (obbligatoria)");   return; }

    let formattedTicket = '';
    if (rawTicket) {
      const numericTicket = rawTicket.replace(/\D/g, '');
      if (numericTicket) {
        const ticketValue = `€${Number(numericTicket).toLocaleString('it-IT')}`;
        formattedTicket   = newCompany ? `${ticketValue} in ${newCompany}` : ticketValue;
      }
    }

    // ── LOGICA MODIFICATA: Ricerca record esistente basata su EMAIL ──
    const { data: existing, error: fetchError } = await supabase
      .from('investors')
      .select('*')
      .eq('email', email)
      .maybeSingle();

    if (existing) {
      const { error } = await supabase.from('investors').update({
        stage:    Array.from(new Set([...(existing.stage   || []), newStage])).filter(Boolean),
        company:  Array.from(new Set([...(existing.company || []), newCompany])).filter(Boolean),
        founders: Array.from(new Set([...(existing.founders || []), currentUser])).filter(Boolean),
        ticket:   (existing.ticket && formattedTicket && !existing.ticket.includes(formattedTicket))
                    ? `${existing.ticket}, ${formattedTicket}`
                    : (existing.ticket || formattedTicket),
        fund:     existing.fund || fund,
        name:     existing.name || invName, // aggiorna il nome se mancava
        phone:    existing.phone || phone,
        p_iva:    existing.p_iva || (piva || null)
      }).eq('id', existing.id);
      
      if (!error) { window.closeModal(); currentPage = 1; loadInvestors(); }
      else         { alert("Errore aggiornamento: " + error.message); }
    } else {
      const { error } = await supabase.from('investors').insert([{
        p_iva:       piva || null,
        name:        invName,
        fund:        fund || "",
        stage:       [newStage],
        company:     newCompany ? [newCompany] : [],
        ticket:      formattedTicket,
        founders:    [currentUser],
        description: "",
        email:       email,
        phone:       phone,
      }]);
      if (!error) { window.closeModal(); currentPage = 1; loadInvestors(); }
      else         { alert("Errore inserimento: " + error.message); }
    }
  };

  loadInvestors();
</script>
</body>
</html>
